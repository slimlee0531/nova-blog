server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/novablog?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 1234

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.slim.blogbackend.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: NovaBlog2026SecretKeyForJwtTokenGenerationAndValidation
  expiration: 86400

openai:
  api-key: ${OPENAI_API_KEY:your-api-key}
  model: gpt-4

novablog:
  ai:
    enabled: true
    default-provider: aliyun
    aliyun:
      api-key: ${ALIYUN_API_KEY:}
      model: qwen3.7-plus
      endpoint: https://llm-jbyc85e0hmzvu5ib.cn-beijing.maas.aliyuncs.com/api/v1
      timeout-seconds: 30
      max-output-tokens: 2048
      temperature: 0.7

logging:
  level:
    com.slim.blogbackend: debug
